<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Fondo redondeado oscuro -->
  <rect width="64" height="64" rx="14" fill="#0d1117"/>

  <!-- Serpiente Python estilizada — dos cuerpos entrelazados -->
  <!-- Cuerpo superior (lima #a3e635) -->
  <path d="M20 14 C20 10 24 8 28 8 L36 8 C40 8 44 10 44 14 L44 24 C44 26 42 28 40 28 L28 28 C24 28 20 26 20 22 Z"
        fill="#a3e635"/>
  <!-- Ojo cuerpo superior -->
  <circle cx="38" cy="16" r="2.5" fill="#0d1117"/>
  <circle cx="38.8" cy="15.2" r="0.9" fill="#a3e635"/>
  <!-- Fosa nasal superior -->
  <circle cx="43" cy="13" r="1" fill="#0d1117"/>

  <!-- Cuerpo inferior (púrpura #a855f7) -->
  <path d="M44 50 C44 54 40 56 36 56 L28 56 C24 56 20 54 20 50 L20 40 C20 38 22 36 24 36 L36 36 C40 36 44 38 44 42 Z"
        fill="#a855f7"/>
  <!-- Ojo cuerpo inferior -->
  <circle cx="26" cy="48" r="2.5" fill="#0d1117"/>
  <circle cx="26.8" cy="47.2" r="0.9" fill="#a855f7"/>
  <!-- Fosa nasal inferior -->
  <circle cx="21" cy="51" r="1" fill="#0d1117"/>

  <!-- Conector central que une los dos cuerpos -->
  <rect x="28" y="26" width="8" height="12" rx="2" fill="#a3e635"/>
  <rect x="28" y="30" width="8" height="8" rx="2" fill="#a855f7"/>
</svg>
